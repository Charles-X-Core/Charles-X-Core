<svg width="235" height="140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="langs-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4444">
        <animate attributeName="stop-color" values="#FF4444;#FF6B35;#FFA500;#FF4444" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
    
    <filter id="langs-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#FF6B35" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect x="2" y="2" width="231" height="136" rx="12" fill="#0a0a0f" stroke="url(#langs-grad)" stroke-width="2">
    <animate attributeName="stroke-opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Title -->
  <text x="117" y="24" font-family="'Fira Code', monospace" font-size="11" fill="#FF6B35" text-anchor="middle" font-weight="bold" filter="url(#langs-glow)">
    Top Languages
  </text>
  
  <!-- Divider -->
  <line x1="50" y1="32" x2="185" y2="32" stroke="url(#langs-grad)" stroke-width="0.5" opacity="0.5"/>
  
  <!-- Language bars -->
  
    <rect x="65" y="45" width="160" height="12" rx="6" fill="#0a0a0f" stroke="#1a1a2e" stroke-width="0.5"/>
    <rect x="65" y="45" width="0" height="12" rx="6" fill="#3178C6" opacity="0.85">
      <animate attributeName="width" from="0" to="56" dur="1s" begin="0s" fill="freeze"/>
      <animate attributeName="opacity" values="0.85;1;0.85" dur="2s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <rect x="65" y="45" width="0" height="12" rx="6" fill="none" stroke="#3178C6" stroke-width="1" opacity="0.4">
      <animate attributeName="width" from="0" to="56" dur="1s" begin="0s" fill="freeze"/>
    </rect>
    <rect x="10" y="44" width="45" height="14" rx="4" fill="#3178C6" opacity="0.2"/>
    <text x="32" y="54" font-family="monospace" font-size="8" fill="#3178C6" text-anchor="middle" font-weight="bold">TS</text>
    <text x="230" y="54" font-family="monospace" font-size="8" fill="#888888" text-anchor="end">35%</text>
    <rect x="65" y="63" width="160" height="12" rx="6" fill="#0a0a0f" stroke="#1a1a2e" stroke-width="0.5"/>
    <rect x="65" y="63" width="0" height="12" rx="6" fill="#F7DF1E" opacity="0.85">
      <animate attributeName="width" from="0" to="40" dur="1s" begin="0.2s" fill="freeze"/>
      <animate attributeName="opacity" values="0.85;1;0.85" dur="2s" begin="0.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="65" y="63" width="0" height="12" rx="6" fill="none" stroke="#F7DF1E" stroke-width="1" opacity="0.4">
      <animate attributeName="width" from="0" to="40" dur="1s" begin="0.2s" fill="freeze"/>
    </rect>
    <rect x="10" y="62" width="45" height="14" rx="4" fill="#F7DF1E" opacity="0.2"/>
    <text x="32" y="72" font-family="monospace" font-size="8" fill="#F7DF1E" text-anchor="middle" font-weight="bold">JS</text>
    <text x="230" y="72" font-family="monospace" font-size="8" fill="#888888" text-anchor="end">25%</text>
    <rect x="65" y="81" width="160" height="12" rx="6" fill="#0a0a0f" stroke="#1a1a2e" stroke-width="0.5"/>
    <rect x="65" y="81" width="0" height="12" rx="6" fill="#3776AB" opacity="0.85">
      <animate attributeName="width" from="0" to="32" dur="1s" begin="0.4s" fill="freeze"/>
      <animate attributeName="opacity" values="0.85;1;0.85" dur="2s" begin="0.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="65" y="81" width="0" height="12" rx="6" fill="none" stroke="#3776AB" stroke-width="1" opacity="0.4">
      <animate attributeName="width" from="0" to="32" dur="1s" begin="0.4s" fill="freeze"/>
    </rect>
    <rect x="10" y="80" width="45" height="14" rx="4" fill="#3776AB" opacity="0.2"/>
    <text x="32" y="90" font-family="monospace" font-size="8" fill="#3776AB" text-anchor="middle" font-weight="bold">PY</text>
    <text x="230" y="90" font-family="monospace" font-size="8" fill="#888888" text-anchor="end">20%</text>
    <rect x="65" y="99" width="160" height="12" rx="6" fill="#0a0a0f" stroke="#1a1a2e" stroke-width="0.5"/>
    <rect x="65" y="99" width="0" height="12" rx="6" fill="#7F52FF" opacity="0.85">
      <animate attributeName="width" from="0" to="19.2" dur="1s" begin="0.6000000000000001s" fill="freeze"/>
      <animate attributeName="opacity" values="0.85;1;0.85" dur="2s" begin="0.6000000000000001s" repeatCount="indefinite"/>
    </rect>
    <rect x="65" y="99" width="0" height="12" rx="6" fill="none" stroke="#7F52FF" stroke-width="1" opacity="0.4">
      <animate attributeName="width" from="0" to="19.2" dur="1s" begin="0.6000000000000001s" fill="freeze"/>
    </rect>
    <rect x="10" y="98" width="45" height="14" rx="4" fill="#7F52FF" opacity="0.2"/>
    <text x="32" y="108" font-family="monospace" font-size="8" fill="#7F52FF" text-anchor="middle" font-weight="bold">KT</text>
    <text x="230" y="108" font-family="monospace" font-size="8" fill="#888888" text-anchor="end">12%</text>
    <rect x="65" y="117" width="160" height="12" rx="6" fill="#0a0a0f" stroke="#1a1a2e" stroke-width="0.5"/>
    <rect x="65" y="117" width="0" height="12" rx="6" fill="#ED8B00" opacity="0.85">
      <animate attributeName="width" from="0" to="12.8" dur="1s" begin="0.8s" fill="freeze"/>
      <animate attributeName="opacity" values="0.85;1;0.85" dur="2s" begin="0.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="65" y="117" width="0" height="12" rx="6" fill="none" stroke="#ED8B00" stroke-width="1" opacity="0.4">
      <animate attributeName="width" from="0" to="12.8" dur="1s" begin="0.8s" fill="freeze"/>
    </rect>
    <rect x="10" y="116" width="45" height="14" rx="4" fill="#ED8B00" opacity="0.2"/>
    <text x="32" y="126" font-family="monospace" font-size="8" fill="#ED8B00" text-anchor="middle" font-weight="bold">JV</text>
    <text x="230" y="126" font-family="monospace" font-size="8" fill="#888888" text-anchor="end">8%</text>
  
  <!-- Corner accents -->
  <path d="M 12 30 L 12 16 Q 12 12 16 12 L 30 12" fill="none" stroke="#FF4444" stroke-width="1.5" opacity="0.5">
    <animate attributeName="stroke" values="#FF4444;#FF6B35;#FF4444" dur="3s" repeatCount="indefinite"/>
  </path>
  <path d="M 223 30 L 223 16 Q 223 12 219 12 L 205 12" fill="none" stroke="#FF6B35" stroke-width="1.5" opacity="0.5"/>
  <path d="M 12 110 L 12 124 Q 12 128 16 128 L 30 128" fill="none" stroke="#FFA500" stroke-width="1.5" opacity="0.5"/>
  <path d="M 223 110 L 223 124 Q 223 128 219 128 L 205 128" fill="none" stroke="#FF4444" stroke-width="1.5" opacity="0.5"/>
</svg>