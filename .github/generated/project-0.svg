<svg width="480" height="260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="proj-0-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4444">
        <animate attributeName="stop-color" values="#FF4444;#FF6B35;#FFA500;#FF4444" dur="4s" begin="0s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#FF6B35">
        <animate attributeName="stop-color" values="#FF6B35;#FFA500;#FF4444;#FF6B35" dur="4s" begin="0s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#FFA500">
        <animate attributeName="stop-color" values="#FFA500;#FF4444;#FF6B35;#FFA500" dur="4s" begin="0s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="proj-0-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#111118"/>
    </linearGradient>
    <filter id="proj-0-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#F7DF1E" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="proj-0-neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#FF6B35" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="proj-0-clip">
      <rect x="16" y="16" width="200" height="130" rx="12"/>
    </clipPath>
  </defs>

  <!-- Glow effect behind card -->
  <rect x="0" y="0" width="480" height="260" rx="16" fill="none" stroke="url(#proj-0-grad)" stroke-width="1" filter="url(#proj-0-glow)" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.15;0.4" dur="3s" begin="0s" repeatCount="indefinite"/>
  </rect>

  <!-- Card background -->
  <rect x="2" y="2" width="476" height="256" rx="14" fill="url(#proj-0-bg)" stroke="url(#proj-0-grad)" stroke-width="2">
    <animate attributeName="stroke-opacity" values="1;0.5;1" dur="2s" begin="0s" repeatCount="indefinite"/>
  </rect>

  <!-- Project screenshot -->
  <image href="https://opengraph.githubassets.com/1/Charles-X-Core/odontologia-sistema" x="16" y="16" width="200" height="130" clip-path="url(#proj-0-clip)" preserveAspectRatio="xMidYMid slice" opacity="0.85"/>

  <!-- Screenshot overlay gradient -->
  <rect x="16" y="16" width="200" height="130" rx="12" fill="url(#proj-0-bg)" opacity="0.3"/>

  <!-- Animated scan line over screenshot -->
  <rect x="16" y="16" width="200" height="4" fill="url(#proj-0-grad)" opacity="0.6" clip-path="url(#proj-0-clip)">
    <animate attributeName="y" values="16;142;16" dur="4s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="4s" begin="0s" repeatCount="indefinite"/>
  </rect>

  <!-- Project icon (Lucide) -->
  <g transform="translate(236, 24)" stroke="#F7DF1E" fill="none" stroke-width="1.5" filter="url(#proj-0-neon)">
    <g transform="scale(0.9)">
      <path d="m18 16 4-4-4-4"/><path d="m6 8-4 4 4 4"/><path d="m14.5 4-5 16"/>
      <animate attributeName="stroke" values="#F7DF1E;#FFA500;#F7DF1E" dur="3s" begin="0s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- Project name -->
  <text x="264" y="44" font-family="'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace" font-size="16" fill="#FF6B35" font-weight="bold" filter="url(#proj-0-neon)">
    odontologia-sistema
    <animate attributeName="fill" values="#FF6B35;#FFA500;#FF6B35" dur="3s" begin="0s" repeatCount="indefinite"/>
  </text>

  <!-- Language badge -->
  <rect x="264" y="56" width="104" height="22" rx="11" fill="#F7DF1E" opacity="0.25"/>
  <rect x="264" y="56" width="104" height="22" rx="11" fill="none" stroke="#F7DF1E" stroke-width="1" opacity="0.6"/>
  <circle cx="278" cy="67" r="4" fill="#F7DF1E"/>
  <text x="288" y="72" font-family="monospace" font-size="10" fill="#F7DF1E">JavaScript</text>

  <!-- Star icon (Lucide) -->
  <g transform="translate(264, 90)" stroke="#FFA500" fill="none" stroke-width="1.5">
    <g transform="scale(0.65)">
      <path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"/>
      <animate attributeName="stroke" values="#FFA500;#FF4444;#FFA500" dur="2s" begin="0s" repeatCount="indefinite"/>
    </g>
  </g>
  <text x="284" y="100" font-family="monospace" font-size="12" fill="#ffffff">1</text>

  <!-- Fork icon (Lucide) -->
  <g transform="translate(320, 90)" stroke="#FF6B35" fill="none" stroke-width="1.5">
    <g transform="scale(0.65)">
      <circle cx="12" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><circle cx="18" cy="6" r="3"/><path d="M18 9v2c0 .6-.4 1-1 1H7c-.6 0-1-.4-1-1V9"/><path d="M12 12v3"/>
    </g>
  </g>
  <text x="340" y="100" font-family="monospace" font-size="12" fill="#ffffff">0</text>

  <!-- Description -->
  <text x="264" y="130" font-family="monospace" font-size="10" fill="#888888">
    Sistema de Historial Clinico Odontologic
    <tspan x="264" dy="14">o para escritorio - Gestion completa de </tspan>
  </text>

  <!-- View Code button -->
  <a href="https://github.com/Charles-X-Core/odontologia-sistema" target="_blank">
    <g transform="translate(264, 170)">
      <rect x="0" y="0" width="90" height="30" rx="15" fill="none" stroke="#FF4444" stroke-width="1.5">
        <animate attributeName="stroke" values="#FF4444;#FF6B35;#FF4444" dur="2s" begin="0s" repeatCount="indefinite"/>
        <animate attributeName="stroke-opacity" values="1;0.5;1" dur="2s" begin="0s" repeatCount="indefinite"/>
      </rect>
      <g transform="translate(10, 8)" stroke="#FF6B35" fill="none" stroke-width="1.5">
        <g transform="scale(0.65)">
          <path d="m18 16 4-4-4-4"/><path d="m6 8-4 4 4 4"/><path d="m14.5 4-5 16"/>
        </g>
      </g>
      <text x="50" y="20" font-family="monospace" font-size="10" fill="#FF6B35" text-anchor="middle">
        Codigo
        <animate attributeName="fill" values="#FF6B35;#FFA500;#FF6B35" dur="2s" begin="0s" repeatCount="indefinite"/>
      </text>
    </g>
  </a>

  <!-- View Live button (only if homepage is a real external URL) -->
  

  <!-- Floating particles -->
  <circle cx="40" cy="240" r="1.5" fill="#FF4444" opacity="0">
    <animate attributeName="cy" values="250;10" dur="6s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="6s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="40;60;40" dur="8s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="200" r="1" fill="#FF6B35" opacity="0">
    <animate attributeName="cy" values="250;20" dur="7s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.4;0" dur="7s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="230" cy="150" r="2" fill="#FFA500" opacity="0">
    <animate attributeName="cy" values="260;5" dur="5s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0" dur="5s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="230;250;230" dur="9s" begin="0s" repeatCount="indefinite"/>
  </circle>

  <!-- Corner accents -->
  <path d="M 16 40 L 16 20 Q 16 16 20 16 L 40 16" fill="none" stroke="#FF4444" stroke-width="2" opacity="0.6">
    <animate attributeName="stroke" values="#FF4444;#FF6B35;#FF4444" dur="3s" begin="0s" repeatCount="indefinite"/>
  </path>
  <path d="M 464 40 L 464 20 Q 464 16 460 16 L 440 16" fill="none" stroke="#FF6B35" stroke-width="2" opacity="0.6">
    <animate attributeName="stroke" values="#FF6B35;#FFA500;#FF6B35" dur="3s" begin="0s" repeatCount="indefinite"/>
  </path>
  <path d="M 16 220 L 16 240 Q 16 244 20 244 L 40 244" fill="none" stroke="#FFA500" stroke-width="2" opacity="0.6">
    <animate attributeName="stroke" values="#FFA500;#FF4444;#FFA500" dur="3s" begin="0s" repeatCount="indefinite"/>
  </path>
  <path d="M 464 220 L 464 240 Q 464 244 460 244 L 440 244" fill="none" stroke="#FF4444" stroke-width="2" opacity="0.6">
    <animate attributeName="stroke" values="#FF4444;#FF6B35;#FF4444" dur="3s" begin="0s" repeatCount="indefinite"/>
  </path>
</svg>